spring.application.name=server

spring.datasource.url=jdbc:mariadb://${DB_URL}:${DB_port}/${DB_dataBaseName}?characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username={DB_USERNAME}
spring.datasource.password={DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret={SECRET_KEY}
jwt.access-token-expiration=360000

springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.path=/swagger-ui.html
spring.jpa.open-in-view=false

spring.security.user.name = {SECURITY_USENAME}
spring.security.user.password = {SECURITY_PASSWORD}
